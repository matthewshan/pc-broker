---
# Adjust host and ingressClassName to match your homelab ingress setup.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-pc-broker
  namespace: llm-pc-broker
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: llm-broker.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-pc-broker
                port:
                  number: 80
