---
# Create this secret manually or via sealed-secrets / external-secrets.
# Example:
#   kubectl create secret generic llm-pc-broker-secrets \
#     --namespace llm-pc-broker \
#     --from-literal=PC_MAC='aa:bb:cc:dd:ee:ff' \
#     --from-literal=API_TOKEN='changeme' \
#     --from-literal=SHUTDOWN_AGENT_TOKEN='changeme'
apiVersion: v1
kind: Secret
metadata:
  name: llm-pc-broker-secrets
  namespace: llm-pc-broker
stringData:
  PC_MAC: "REPLACE_ME"
  API_TOKEN: "REPLACE_ME"
  SHUTDOWN_AGENT_TOKEN: ""
  SHUTDOWN_AGENT_URL: ""
